<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #D71920; }

    /* ========================================================================
       BACKGROUND
       ======================================================================== */
    #bg {
      position: absolute; inset: 0; width: 1920px; height: 1080px;
      background: #D71920; z-index: 0;
    }
    #bg-inner {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.06) 0%, transparent 70%);
    }

    /* ========================================================================
       METAL FRAME — Outer container
       ======================================================================== */
    #metal-frame {
      position: absolute;
      left: 50%; top: 50%;
      width: 1200px; height: 400px;
      transform: translate(-50%, -50%);
      z-index: 1;
    }
    #metal-frame-clip {
      position: absolute; inset: 0;
      border-radius: 32px;
      overflow: hidden;
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.9),
        0 0 0 10px rgba(180,180,190,0.7),
        0 0 0 14px rgba(255,255,255,0.4),
        0 0 0 16px rgba(0,0,0,0.3),
        inset 0 0 60px rgba(0,0,0,0.7);
    }
    /* Double chrome border effect via pseudo-elements */
    #metal-frame-clip::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 32px;
      border: 3px solid rgba(255,255,255,0.15);
      z-index: 3; pointer-events: none;
    }
    #metal-frame-bg {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #1a1a1e 0%, #0d0d0f 50%, #1a1a1e 100%);
      z-index: 0;
    }
    /* Inner shadow */
    #metal-frame-shadow {
      position: absolute; inset: 0;
      border-radius: 32px;
      box-shadow: inset 0 60px 80px -40px rgba(0,0,0,0.8), inset 0 -40px 60px -30px rgba(0,0,0,0.5);
      z-index: 2; pointer-events: none;
    }

    /* ========================================================================
       BRUSHED METAL TEXTURE — Diagonal streaks
       ======================================================================== */
    .metal-streak {
      position: absolute; top: -200px; left: -200px;
      width: 1600px; height: 800px;
      pointer-events: none; z-index: 1;
    }
    .metal-streak-1 {
      background: linear-gradient(
        135deg,
        transparent 0%, transparent 35%,
        rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.15) 42%,
        transparent 44%, transparent 100%
      );
    }
    .metal-streak-2 {
      background: linear-gradient(
        135deg,
        transparent 0%, transparent 25%,
        rgba(255,255,255,0.04) 30%, rgba(255,255,255,0.10) 32%,
        transparent 34%, transparent 100%
      );
    }
    .metal-streak-3 {
      background: linear-gradient(
        135deg,
        transparent 0%, transparent 50%,
        rgba(255,255,255,0.06) 55%, rgba(255,255,255,0.12) 57%,
        transparent 59%, transparent 100%
      );
    }
    .metal-streak-4 {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.02) 0%, transparent 10%,
        rgba(255,255,255,0.03) 20%, transparent 30%,
        rgba(255,255,255,0.04) 40%, transparent 50%,
        rgba(255,255,255,0.02) 60%, transparent 70%,
        rgba(255,255,255,0.03) 80%, transparent 90%,
        rgba(255,255,255,0.02) 100%
      );
    }
    /* Additional subtle grain */
    #metal-grain {
      position: absolute; inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px 256px;
      z-index: 1; mix-blend-mode: overlay;
    }

    /* ========================================================================
       CHROME BEVEL / GLOSS — Top edge highlight
       ======================================================================== */
    #chrome-gloss {
      position: absolute; top: 0; left: 0; right: 0; height: 60%;
      border-radius: 32px 32px 0 0;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.06) 20%,
        rgba(255,255,255,0.02) 50%,
        transparent 100%
      );
      z-index: 2; pointer-events: none;
    }
    /* Bottom reflection */
    #chrome-reflect {
      position: absolute; bottom: 0; left: 10%; right: 10%; height: 20%;
      background: linear-gradient(0deg,
        rgba(255,255,255,0.04) 0%,
        transparent 100%
      );
      border-radius: 0 0 32px 32px;
      z-index: 2; pointer-events: none;
    }
    /* Fresnel edge reflections */
    #fresnel-left {
      position: absolute; top: 10%; left: 0; bottom: 10%; width: 4px;
      background: linear-gradient(180deg,
        transparent 0%, rgba(255,255,255,0.15) 30%,
        rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.12) 70%,
        transparent 100%
      );
      border-radius: 4px; z-index: 3; pointer-events: none;
    }
    #fresnel-right {
      position: absolute; top: 15%; right: 0; bottom: 15%; width: 3px;
      background: linear-gradient(180deg,
        transparent 0%, rgba(255,255,255,0.08) 20%,
        rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.06) 80%,
        transparent 100%
      );
      border-radius: 3px; z-index: 3; pointer-events: none;
    }

    /* ========================================================================
       LOGO
       ======================================================================== */
    #logo-container {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 960px; height: auto;
      z-index: 4;
      display: flex; align-items: center; justify-content: center;
    }
    #logo-container img {
      width: 100%; height: auto;
      display: block;
      filter:
        drop-shadow(0 0 20px rgba(255,255,255,0.08))
        drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    /* ========================================================================
       SPECULAR HIGHLIGHT SWEEP
       ======================================================================== */
    #specular-sweep {
      position: absolute; top: -20%; left: -80%;
      width: 60%; height: 140%;
      background: linear-gradient(
        135deg,
        transparent 0%,
        rgba(255,255,255,0.02) 25%,
        rgba(255,255,255,0.12) 40%,
        rgba(255,255,255,0.20) 45%,
        rgba(255,255,255,0.12) 50%,
        rgba(255,255,255,0.02) 55%,
        transparent 100%
      );
      transform: skewX(-20deg);
      z-index: 5; pointer-events: none;
      opacity: 0;
    }
    /* Secondary sweep — wider, dimmer */
    #specular-sweep-2 {
      position: absolute; top: -30%; left: -100%;
      width: 80%; height: 160%;
      background: linear-gradient(
        135deg,
        transparent 0%,
        rgba(255,255,255,0.01) 30%,
        rgba(255,255,255,0.06) 45%,
        rgba(255,255,255,0.02) 55%,
        transparent 100%
      );
      transform: skewX(-15deg);
      z-index: 5; pointer-events: none;
      opacity: 0;
    }

    /* ========================================================================
       GLOW PULSE OVERLAY
       ======================================================================== */
    #glow-overlay {
      position: absolute;
      left: 50%; top: 50%;
      width: 1000px; height: 300px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.03) 0%, transparent 70%);
      z-index: 3; pointer-events: none;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="10"
    data-width="1920"
    data-height="1080"
  >
    <!-- BACKGROUND — Solid Corporate Red -->
    <div id="bg" class="clip" data-start="0" data-duration="10" data-track-index="0">
      <div id="bg-inner"></div>
    </div>

    <!-- METAL FRAME PANEL -->
    <div id="metal-frame" class="clip" data-start="0" data-duration="10" data-track-index="1">
      <div id="metal-frame-clip">
        <div id="metal-frame-bg"></div>

        <!-- BRUSHED METAL TEXTURE STREAKS -->
        <div class="metal-streak metal-streak-1" id="streak-1"></div>
        <div class="metal-streak metal-streak-2" id="streak-2"></div>
        <div class="metal-streak metal-streak-3" id="streak-3"></div>
        <div class="metal-streak metal-streak-4" id="streak-4"></div>

        <!-- Grain overlay -->
        <div id="metal-grain"></div>

        <!-- Chrome gloss / bevel -->
        <div id="chrome-gloss"></div>
        <div id="chrome-reflect"></div>

        <!-- Fresnel reflections -->
        <div id="fresnel-left"></div>
        <div id="fresnel-right"></div>

        <!-- Inner shadow -->
        <div id="metal-frame-shadow"></div>
      </div>
    </div>

    <!-- SUBTLE GLOW PULSE -->
    <div id="glow-overlay" class="clip" data-start="0" data-duration="10" data-track-index="2"></div>

    <!-- LOGO — Static, centered -->
    <div id="logo-container" class="clip" data-start="0" data-duration="10" data-track-index="3">
      <img src="assets/logo.png" alt="Metalico" />
    </div>

    <!-- SPECULAR HIGHLIGHT SWEEP 1 -->
    <div id="specular-sweep" class="clip" data-start="0" data-duration="10" data-track-index="4"></div>

    <!-- SPECULAR HIGHLIGHT SWEEP 2 (dim, wider) -->
    <div id="specular-sweep-2" class="clip" data-start="0" data-duration="10" data-track-index="5"></div>
  </div>

  <script>
    // ==========================================================================
    // ANIMATION CONSTANTS — Tweak these to adjust the look
    // ==========================================================================
    const REFLECTION_SPEED = 1;        // Base speed multiplier for metal streaks
    const SHIMMER_SPEED = 1;           // Speed multiplier for specular sweep
    const BLOOM_INTENSITY = 0.6;       // Glow pulse opacity multiplier (0-1)
    const LIGHT_DIRECTION = 135;       // Degrees: 135 = top-left to bottom-right
    const METAL_ROUGHNESS = 0.6;       // 0 = mirror, 1 = matte

    // ==========================================================================
    // TIMELINE SETUP — All animations are registered on window.__timelines
    // No infinite repeats: deterministic capture requires finite counts.
    // ==========================================================================
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // ==========================================================================
    // 1. BRUSHED METAL STREAKS — Continuous diagonal movement
    //    Each streak moves at a different speed for depth.
    //    Finite repeat: 2 cycles across 10s = repeat 1 per 5s cycle.
    // ==========================================================================
    const STREAK_CYCLE = 5;
    const STREAK_REPEAT = Math.floor(10 / STREAK_CYCLE) - 1;
    const streakConfigs = [
      { id: "#streak-1", speed: 0.3, offsetX: 0, offsetY: 0 },
      { id: "#streak-2", speed: 0.5, offsetX: -100, offsetY: -60 },
      { id: "#streak-3", speed: 0.7, offsetX: -200, offsetY: -120 },
      { id: "#streak-4", speed: 0.2, offsetX: -300, offsetY: -180 },
    ];

    streakConfigs.forEach(function(cfg) {
      gsap.set(cfg.id, { x: cfg.offsetX, y: cfg.offsetY });
      tl.to(cfg.id, {
        x: 400 * cfg.speed * REFLECTION_SPEED,
        y: 250 * cfg.speed * REFLECTION_SPEED,
        duration: STREAK_CYCLE,
        ease: "none",
        repeat: STREAK_REPEAT
      }, 0);
    });

    // ==========================================================================
    // 2. GLOW PULSE — Subtle breathing effect behind the logo
    //    Complete 2 full breath cycles in 10s (each cycle = 5s)
    // ==========================================================================
    tl.fromTo("#glow-overlay", {
      opacity: 0.3 * BLOOM_INTENSITY,
      scale: 1.0
    }, {
      opacity: 0.5 * BLOOM_INTENSITY,
      scale: 1.05,
      duration: 2.5,
      ease: "sine.inOut",
      yoyo: true,
      repeat: 3
    }, 0);

    // ==========================================================================
    // 3. SPECULAR HIGHLIGHT SWEEP — Shimmer crossing the logo every 3 seconds
    //    First sweep (bright, narrow) — 3 full sweeps + 1 partial
    // ==========================================================================
    var sweepPositions = [0.5, 3.5, 6.5, 9.5];
    sweepPositions.forEach(function(time) {
      tl.to("#specular-sweep", { opacity: 1, duration: 0.1, ease: "none" }, time);
      tl.to("#specular-sweep", {
        x: 2600,
        y: 1500,
        duration: 1.2 * SHIMMER_SPEED,
        ease: "power2.inOut"
      }, time + 0.1);
      tl.to("#specular-sweep", { opacity: 0, duration: 0.1, ease: "none" }, time + 1.3);
    });

    // ==========================================================================
    // 4. SECONDARY SWEEP — Wider, dimmer shimmer, offset timing
    // ==========================================================================
    var sweep2Positions = [1.2, 4.2, 7.2];
    sweep2Positions.forEach(function(time) {
      tl.to("#specular-sweep-2", { opacity: 0.6, duration: 0.2, ease: "none" }, time);
      tl.to("#specular-sweep-2", {
        x: 3000,
        y: 1800,
        duration: 1.8 * SHIMMER_SPEED,
        ease: "power1.inOut"
      }, time + 0.2);
      tl.to("#specular-sweep-2", { opacity: 0, duration: 0.2, ease: "none" }, time + 2.0);
    });

    // ==========================================================================
    // 5. SUBTLE CHROME GLOSS SCINTILLATION
    // ==========================================================================
    tl.fromTo("#chrome-gloss", { opacity: 0.4 }, {
      opacity: 0.6,
      duration: 4,
      ease: "sine.inOut",
      yoyo: true,
      repeat: 1
    }, 0);

    // ==========================================================================
    // REGISTER TIMELINE
    // ==========================================================================
    window.__timelines["main"] = tl;
  </script>
</body>
</html>
